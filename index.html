<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage - Expérience Spéciale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="retro-body">
    <div id="app">
        <!-- Section Login -->
        <section id="login-screen" class="screen">
            <div class="login-box">
                <h2>Système d'Accès Souvenir</h2>
                <p>Veuillez entrer le mot de passe pour charger les archives.</p>
                <input type="password" id="password-field" placeholder="Mot de passe...">
                <button id="login-ok-btn">OK</button>
            </div>
        </section>

        <!-- Section Boot (Vieux PC) -->
        <section id="boot-screen" class="screen hidden">
            <div id="boot-log"></div>
        </section>

        <!-- Section Loading (Petits carrés) -->
        <section id="loading-screen" class="screen hidden">
            <div class="loader-container">
                <h3>Chargement des médias...</h3>
                <div id="square-loader"></div>
                <div id="loading-status">0%</div>
            </div>
        </section>

        <!-- Section Journey (Expérience principale) -->
        <section id="journey-screen" class="screen hidden">
            <div id="transport-transition" class="hidden">
                <div class="transport-icon"></div>
                <h2 id="transition-text">En route...</h2>
            </div>
            <div id="journey-content">
                <div id="dialogue-container">
                    <div class="dialogue-box">
                        <h2 id="city-title">Ville</h2>
                        <div id="dialogue-text">Texte ici...</div>
                        <button id="next-city-btn">Continuer le voyage</button>
                    </div>
                </div>
                <div id="visual-container">
                    <!-- Les photos s'affichent ici avec des styles thématiques -->
                </div>
            </div>
        </section>

        <!-- Section Final (Nuage/Lac) -->
        <section id="final-screen" class="screen hidden">
            <div id="final-background">
                <div id="interactive-cloud-lake"></div>
                <div class="video-container">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/J8ugZk1rPpU" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
            </div>
        </section>
    </div>

    <!-- Audios -->
    <audio id="audio-boot" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Windows+95+Startup&filename=mt/mtu3mtcyote1mtcyote4_6_2fmcx_2fl_2bnq_2bm.mp3"></audio>
    <audio id="audio-loading" loop src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Computer+Hard+Drive+Noise&filename=mz/mzkzody2MzYzOTkzOTYw_2f3_2f_2bM_2f_2b_2fI_2f_2fR0.mp3"></audio>
    <audio id="audio-click" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Mouse+Click&filename=mt/mtu3mtcyote1mtcyote4_7_2fmcx_2fl_2bnq_2bm.mp3"></audio>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
