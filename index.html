<!DOCTYPE html>
<html lang="fr">
<head>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM – Voyage Aventure</title>
    <link rel="stylesheet" href="map.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNSNTWJB"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="loading-overlay">
        <h2>Initialisation du voyage...</h2>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div id="adventure-map">
        <div class="ocean"></div>
        <svg id="decorations-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- Simplified Landmass Outlines -->
            <!-- Morocco -->
            <path d="M5,75 Q15,70 25,80 Q20,95 5,90 Z" class="land-outline" />
            <!-- France / Iberia -->
            <path d="M25,50 Q35,45 45,55 Q40,70 25,70 Z" class="land-outline" />
            <!-- Scandinavia -->
            <path d="M65,5 Q85,10 90,30 Q70,40 60,20 Z" class="land-outline" />
            <!-- Eastern Europe -->
            <path d="M70,45 Q90,40 95,65 Q80,80 65,70 Z" class="land-outline" />

            <!-- Compass Rose -->
            <g id="compass" transform="translate(90, 10)">
                <circle cx="0" cy="0" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
                <path d="M0,-6 L1,0 L0,1 L-1,0 Z" fill="#d35400" />
                <text x="0" y="-7" font-size="3" text-anchor="middle">N</text>
            </g>

            <!-- Region Labels -->
            <text x="15" y="82" class="region-label">Maroc</text>
            <text x="35" y="60" class="region-label">France</text>
            <text x="75" y="25" class="region-label">Scandinavie</text>
            <text x="80" y="65" class="region-label">Europe de l'Est</text>
        </svg>
        <div class="wave"></div>
        <svg id="links-layer" viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 1;"></svg>
        <div id="nodes-layer"></div>
    </div>

    <div id="map-info">
        <h1>VOYAGE</h1>
        <p>Explorez les souvenirs, traversez les frontières. Cliquez sur une destination pour découvrir son histoire.</p>
    </div>

    <a href="index_beta.html" class="retro-link">Version Rétro</a>

    <script src="map.js"></script>
</body>
</html>
