<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage - Expérience Spéciale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="retro-body">
    <div id="language-toggle">
        <button class="retro-btn" onclick="setLanguage('fr')">FR</button>
        <button class="retro-btn" onclick="setLanguage('de')">DE</button>
    </div>
    <div id="app">
        <!-- Section Login -->
        <section id="login-screen" class="screen">
            <div class="login-box">
                <h2>Système d'Accès Souvenir</h2>
                <p>Veuillez entrer le mot de passe pour charger les archives.</p>
                <input type="password" id="password-field" placeholder="Mot de passe...">
                <button id="login-ok-btn" class="retro-btn">OK</button>
            </div>
        </section>

        <!-- Section Boot (Vieux PC) -->
        <section id="boot-screen" class="screen hidden">
            <div id="boot-log"></div>
        </section>

        <!-- Section Loading (Petits carrés) -->
        <section id="loading-screen" class="screen hidden">
            <div class="loader-container">
                <h3>Chargement des médias...</h3>
                <div id="square-loader"></div>
                <div id="loading-status">0%</div>
            </div>
        </section>

        <!-- Section Journey (Expérience principale) -->
        <section id="journey-screen" class="screen hidden">
            <div id="transport-transition" class="hidden">
                <div class="transport-icon"></div>
                <h2 id="transition-text">En route...</h2>
            </div>
            <div id="journey-content">
                <div id="dialogue-container">
                    <div class="dialogue-box">
                        <h2 id="city-title">Ville</h2>
                        <div id="dialogue-text">Texte ici...</div>
                        <button id="next-city-btn" class="retro-btn">Continuer le voyage</button>
                    </div>
                </div>
                <div id="visual-container">
                    <!-- Les photos s'affichent ici avec des styles thématiques -->
                </div>
            </div>
        </section>

        <!-- Section Final (Nuage/Lac) -->
        <section id="final-screen" class="screen hidden">
            <!-- Desktop Icons -->
            <div class="desktop-icon" onclick="openWin98('win-archives')">
                <div class="fallback-icon folder"></div>
                <span>Mes Archives</span>
            </div>
            <div class="desktop-icon" onclick="openWin98('win-video-final')">
                <div class="fallback-icon video"></div>
                <span>Vidéo Final</span>
            </div>
            <div class="desktop-icon" onclick="openWin98('win-poems')">
                <div class="fallback-icon poem"></div>
                <span>Poèmes</span>
            </div>

            <!-- Windows -->
            <div id="win-archives" class="win98-window">
                <div class="win98-title"><span>C:\Voyage\Archives</span><button class="win98-close" onclick="closeWin98('win-archives')">X</button></div>
                <div class="win98-content folder-grid" id="archives-grid"></div>
            </div>

            <div id="win-folder-view" class="win98-window">
                <div class="win98-title"><span id="folder-view-title">Dossier</span><button class="win98-close" onclick="closeWin98('win-folder-view')">X</button></div>
                <div class="win98-content scrollable" id="folder-view-body"></div>
            </div>

            <div id="win-poems" class="win98-window">
                <div class="win98-title"><span>Bibliothèque de Poésie</span><button class="win98-close" onclick="closeWin98('win-poems')">X</button></div>
                <div class="win98-content folder-grid" id="poems-grid"></div>
            </div>

            <div id="win-video-final" class="win98-window" style="width: 600px; height: 450px;">
                <div class="win98-title"><span>Windows Media Player</span><button class="win98-close" onclick="closeWin98('win-video-final')">X</button></div>
                <div class="win98-content" style="background:#000; padding:0;">
                    <iframe id="video-final-frame" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <!-- Bottom Easter Egg -->
            <div style="position:fixed; bottom:0; right:0; width:10px; height:10px; cursor:help;" onclick="showAlert('Secret', 'Vous avez trouvé le coin secret ! Félicitations.')"></div>
        </section>

        <!-- Custom Modal -->
        <div id="custom-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modal-title">System Message</span>
                    <button id="modal-close-btn">X</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Content goes here -->
                </div>
                <div class="modal-footer">
                    <button id="modal-ok-btn" class="retro-btn">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audios -->
    <audio id="audio-boot" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Windows+95+Startup&filename=mt/mtu3mtcyote1mtcyote4_6_2fmcx_2fl_2bnq_2bm.mp3"></audio>
    <audio id="audio-loading" loop src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Computer+Hard+Drive+Noise&filename=mz/mzkzody2MzYzOTkzOTYw_2f3_2f_2bM_2f_2b_2fI_2f_2fR0.mp3"></audio>
    <audio id="audio-click" src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Mouse+Click&filename=mt/mtu3mtcyote1mtcyote4_7_2fmcx_2fl_2bnq_2bm.mp3"></audio>

    <div id="zoom-overlay">
        <img src="" alt="Zoomed memory">
        <div id="zoom-cart-banner">
            <span id="zoom-product-name">Nom du produit</span>
            <button class="retro-btn" id="zoom-add-btn">Ajouter au panier</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
