<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IRTIFA OS - Voyage</title>
    <link rel="stylesheet" href="style_beta.css">
    <script src="script_beta.js" defer></script>

</head>
<body class="crt">
    <audio id="snd-startup" src="https://win98icons.alexmeub.com/sounds/startup.mp3"></audio>
    <audio id="snd-error" src="https://win98icons.alexmeub.com/sounds/chord.mp3"></audio>

    <div id="boot-screen">
        <div id="boot-log"></div>
    </div>

    <div id="login-screen" class="hidden">
        <div class="xp-dialog shadow">
            <div class="xp-title">Ouverture de session Windows</div>
            <div class="xp-body">
                <img src="https://win98icons.alexmeub.com/icons/png/key_padlock-0.png" width="48">
                <div style="display: flex; align-items: flex-end; gap: 10px; width: 100%;">
                    <div style="flex-grow: 1;">
                        <p style="margin: 0 0 5px 0; font-size: 12px; color: #000;">Tapez votre mot de passe (octobre) :</p>
                        <input type="password" id="pass-input" style="width: 100%; padding: 3px;" autofocus>
                    </div>
                    <button class="xp-ok-btn" onclick="checkPassword()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="xp-load-container">
            <img src="https://win98icons.alexmeub.com/icons/png/msagent-0.png" width="64">
            <p>Chargement de vos paramètres personnels...</p>
            <div class="xp-progress-bar"><div class="xp-progress-fill"></div></div>
        </div>
    </div>

    <div id="error-box" class="hidden">
        <div class="xp-dialog error-border shadow">
            <div class="xp-title error-bg">Erreur</div>
            <div class="xp-body">
                <img src="https://win98icons.alexmeub.com/icons/png/msg_error-0.png" width="32">
                <p style="color: #000;">Mot de passe incorrect.</p>
                <button onclick="closeError()" style="margin-left: auto; padding: 2px 10px;">OK</button>
            </div>
        </div>
    </div>

    <div id="desktop" class="hidden">
        <div class="desktop-icons">
            <div class="icon" onclick="openWindow('win-explorer')">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
                <span>Archives Voyage</span>
            </div>
        </div>

        <div id="win-explorer" class="win98-window hidden">
            <div class="win-title"><span>C:\Voyage</span><button onclick="closeWindow('win-explorer')">X</button></div>
            <div class="win-content folder-grid" id="main-explorer"></div>
        </div>

        <div id="win-country" class="win98-window hidden">
            <div class="win-title"><span id="country-title">Notepad</span><button onclick="closeWindow('win-country')">X</button></div>
            <div class="win-content scrollable" id="country-body"></div>
        </div>
        <div id="win-video" class="win98-window hidden">
    <div class="win-title">
        <span>Lecteur Vidéo</span>
        <button onclick="closeWindow('win-video')">X</button>
    </div>
    <div class="win-content" style="padding: 0; background: #000;">
        <iframe id="youtube-frame" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
    </div>
        </div>

        <div id="win-calc" class="win98-window hidden" style="width: 220px;">
            <div class="win-title"><span>Calculatrice</span><button onclick="closeWindow('win-calc')">X</button></div>
            <div class="win-content">
                <input type="text" id="calc-screen" readonly style="width:100%; text-align:right; margin-bottom:10px; padding: 5px; background:#fff; border:2px inset #eee;">
                <div class="calc-buttons">
                    <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button onclick="calcIn('/')">/</button>
                    <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button onclick="calcIn('*')">*</button>
                    <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button onclick="calcIn('-')">-</button>
                    <button onclick="calcIn('0')">0</button><button onclick="calcClear()">C</button><button onclick="calcRes()">=</button><button onclick="calcIn('+')">+</button>
                </div>
            </div>
        </div>

        <div class="taskbar">
            <button class="start-btn" onclick="toggleMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16">
                <strong>Démarrer</strong>
            </button>

            <div id="start-menu" class="hidden shadow">
                <div class="start-sidebar"><span>IRTIFA OS</span></div>
                <div class="start-list">
                    <div onclick="openWindow('win-calc'); toggleMenu();">🧮 Calculatrice</div>
                    <div onclick="window.location.href='index.html'">🌐 Retour au site</div>
                    <hr>
                    <div onclick="location.reload()">🔒 Déconnexion</div>
                </div>
            </div>

            <div class="taskbar-divider"></div>
            <div class="clock" id="clock">12:00</div>
        </div>
    </div>

</body>

</html>
